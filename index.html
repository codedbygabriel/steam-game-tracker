<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Steam Progress Tracker</title>
        <link href="./source/styling/main.css" rel="stylesheet" />
        <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    </head>
    <body>
        <main class="main-content main-content-base">
            <!-- App Itself -->
            <article class="main-article">
                <header>
                    <h1 class="header-title">Steam Progress Tracker</h1>
                    <small> Give yourself a chance of finishing what you've bought. </small>
                </header>
                <div class="search-wrapper">
                    <input
                        id="search-steam-id"
                        type="text"
                        name="search-steam-id"
                        placeholder="Your Steam URL/ID Here."
                    />
                    <button class="search-steam-button" type="button">Search</button>
                </div>
                <!-- TODO: History of searchs -->
                <section class="search-history">
                    <ul class="search-history-list"></ul>
                </section>
            </article>
            <!-- Games / Content -->
            <section class="hidden games-panel">
                <header class="games-panel-header">
                    <h2 class="games-panel-title"></h2>
                    <small> May contain free games, outdated history. It's purely based on Steam's Api. </small>
                </header>
                <nav class="games-panel-nav">
                    <button class="func-button hours-filter" type="button">Hours</button>
                    <button class="func-button az-filter" type="button">A-Z</button>
                    <button class="func-button export-button" type="button">Export</button>
                </nav>
                <div class="panel-items"></div>
            </section>
        </main>
    </body>
    <script type="module" src="./source/code/main.js"></script>
</html>
